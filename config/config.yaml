# Video Agent 配置文件 - 简化版
# 仅使用 YouTube 字幕 + LLM 翻译

# ============================================
# 1. 大模型接口配置 (LLM APIs - 用于翻译)
# ============================================
# 提示: 只需要启用一个即可，建议优先使用国内API

# 🥇 推荐: DeepSeek (性价比最高)
deepseek:
  enabled: false
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"

# 🥈 推荐: 智谱GLM-4-Flash (完全免费!)
zhipu:
  enabled: false
  api_key: "${ZHIPU_API_KEY}"
  model: "glm-4-flash"

# 🥉 推荐: Moonshot Kimi (长文本最强)
moonshot:
  enabled: true
  api_key: "${MOONSHOT_API_KEY}"
  base_url: "https://api.moonshot.cn/v1"
  model: "moonshot-v1-8k"

# 阿里云 - 通义千问
dashscope:
  enabled: false
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen-max"

# OpenAI (可选)
openai:
  enabled: false
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
  model: "gpt-4o-mini"

# ============================================
# 2. YouTube 监控配置
# ============================================

youtube:
  channels:
    - name: "Linus Tech Tips"
      url: "https://www.youtube.com/@LinusTechTips"
      language: "en"
      category: "科技"
      filter:
        min_duration: 600
    # 添加更多频道...
  
  check_interval: 300
  download:
    quality: "1080p"
    format: "mp4"
    subtitle_langs: ["en"]

# ============================================
# 3. 视频处理配置
# ============================================

processing:
  # 字幕样式
  subtitle:
    enabled: true
    style: "modern"
    font: "Noto Sans CJK SC"
    font_size: 24
    primary_color: "&H00FFFFFF"
    outline_color: "&H00000000"
    position: "bottom"

# ============================================
# 4. 工作流配置
# ============================================

workflow:
  auto_process: true
  steps:
    - download      # 下载视频
    - subtitle      # 下载字幕
    - translate     # 翻译
    - compose       # 视频合成
  review_required: false
  retry:
    max_attempts: 3
    delay: 60

# ============================================
# 5. 数据库配置
# ============================================

database:
  type: "sqlite"
  sqlite:
    path: "./database/video_agent.db"

# ============================================
# 6. Web UI 配置
# ============================================

webui:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  auth:
    enabled: true
    username: "admin"
    password: "${WEBUI_PASSWORD:-admin123}"

# ============================================
# 7. 日志配置
# ============================================

logging:
  level: "INFO"
  file: "./logs/video-agent.log"
  max_size: "100MB"
  backup_count: 7
  
# ============================================
# 8. 系统配置
# ============================================

system:
  max_concurrent_tasks: 2
  download_path: "./downloads"
  output_path: "./outputs"
  temp_path: "./temp"
  cleanup:
    enabled: true
    keep_days: 7
